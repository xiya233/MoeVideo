# Docker Compose production stack for MoeVideo (local build, no GHCR).
# Use with: docker compose --env-file .env.docker up -d --build

name: moevideo

services:
  srs:
    image: ossrs/srs:5
    container_name: moevideo-srs
    restart: unless-stopped
    # SRS config is template-mounted from host and rendered at container start.
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        cp /usr/local/srs/conf/srs.conf.template /usr/local/srs/conf/srs.conf
        sed -i "s|__SRS_HLS_FRAGMENT_SEC__|${SRS_HLS_FRAGMENT_SEC:-6}|g" /usr/local/srs/conf/srs.conf
        sed -i "s|__SRS_HLS_WINDOW_SEC__|${SRS_HLS_WINDOW_SEC:-60}|g" /usr/local/srs/conf/srs.conf
        sed -i "s|__SRS_CALLBACK_URL__|${SRS_CALLBACK_URL:-http://backend:8080/api/v1/live/srs/callback}|g" /usr/local/srs/conf/srs.conf
        if grep -q "__SRS_" /usr/local/srs/conf/srs.conf; then
          echo "srs.conf render failed: unresolved placeholders found"
          cat /usr/local/srs/conf/srs.conf
          exit 1
        fi
        exec ./objs/srs -c conf/srs.conf
    ports:
      - "${SRS_RTMP_PORT:-1935}:1935"
      - "${SRS_HTTP_PORT:-8081}:8080"
      - "${SRS_API_PORT:-1985}:1985"
    volumes:
      - ./data/srs/records:/data/live-recordings
      - ./docker/srs/srs.conf.template:/usr/local/srs/conf/srs.conf.template:ro

  redis:
    image: redis:8-bookworm
    container_name: moevideo-redis
    restart: unless-stopped
    # AOF keeps better durability for counters/rate-limit keys after restart.
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    image: moevideo/backend:local
    container_name: moevideo-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      # Force container-internal data paths so all persistent data goes to ./data bind mounts.
      DB_PATH: /data/db/moevideo.db
      LOCAL_STORAGE_DIR: /data/storage
      TASK_TEMP_DIR: /data/temp
      HTTP_ADDR: :8080
      RATE_LIMIT_REDIS_ADDR: redis:6379
      IMPORT_PAGE_RESOLVER_CMD: bun /app/scripts/page_manifest_resolver.mjs
      LIVE_ENABLED: ${LIVE_ENABLED:-true}
      LIVE_APP_NAME: ${LIVE_APP_NAME:-live}
      LIVE_RTMP_SERVER_URL: ${LIVE_RTMP_SERVER_URL:-rtmp://localhost}
      LIVE_PLAYBACK_BASE_URL: ${LIVE_PLAYBACK_BASE_URL:-http://localhost:8081/live}
      LIVE_CALLBACK_SECRET: ${LIVE_CALLBACK_SECRET:-}
      LIVE_RECORD_DIR: /data/live-recordings
      # gosu privilege drop runtime user mapping.
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    depends_on:
      srs:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./data/db:/data/db
      - ./data/storage:/data/storage
      - ./data/temp:/data/temp
      - ./data/srs/records:/data/live-recordings
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runtime
      args:
        # Build-time fallback only. Runtime value comes from env -> /runtime-env.js.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    image: moevideo/frontend:local
    container_name: moevideo-frontend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
      # gosu privilege drop runtime user mapping.
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
